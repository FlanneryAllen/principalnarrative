name: Clarion Call

on:
  pull_request:
    paths:
      - '.narrative/**'
      - 'README.md'
      - 'docs/**'
      - '*.md'
      - '**/*.md'

jobs:
  clarion-call:
    name: Narrative Coherence Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Get changed .md files
        id: changed
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.md' '**/*.md' | head -100)
          echo "count=$(echo "$CHANGED" | grep -c . || true)" >> $GITHUB_OUTPUT
          # Save for per-file scan
          echo "$CHANGED" > /tmp/changed-files.txt

      - name: Run full check
        id: check-all
        run: |
          # Run narrative check in JSON mode
          npx narrative check --json > /tmp/check-all.json 2>&1 || true
          npx narrative status --json > /tmp/status.json 2>&1 || true

      - name: Run check on changed files only
        id: check-changed
        if: steps.changed.outputs.count != '0'
        run: |
          # Check only files that changed in this PR
          FILES=$(cat /tmp/changed-files.txt | tr '\n' ' ')
          if [ -n "$FILES" ]; then
            npx narrative check $FILES --json > /tmp/check-changed.json 2>&1 || true
          fi

      - name: Build PR comment
        id: comment
        run: |
          node << 'SCRIPT'
          const fs = require('fs');

          // Read results
          let status = {};
          let checkAll = {};
          let checkChanged = null;

          try { status = JSON.parse(fs.readFileSync('/tmp/status.json', 'utf-8')); } catch {}
          try { checkAll = JSON.parse(fs.readFileSync('/tmp/check-all.json', 'utf-8')); } catch {}
          try { checkChanged = JSON.parse(fs.readFileSync('/tmp/check-changed.json', 'utf-8')); } catch {}

          const combined = status.combined ?? 100;
          const canonScore = status.canonScore ?? 100;
          const contentScore = status.contentScore ?? 100;
          const units = status.units ?? 0;
          const violations = status.violations ?? 0;
          const files = status.files ?? 0;

          // Build comment
          const icon = combined >= 80 ? '🟢' : combined >= 60 ? '🟡' : '🔴';
          let comment = `## 📣 Clarion Call — Narrative Coherence\n\n`;
          comment += `| Metric | Value |\n|--------|-------|\n`;
          comment += `| Combined Score | ${icon} **${combined} / 100** |\n`;
          comment += `| Canon Score | ${canonScore} / 100 |\n`;
          comment += `| Content Score | ${contentScore} / 100 |\n`;
          comment += `| Narrative Units | ${units} |\n`;
          comment += `| Files Scanned | ${files} |\n`;
          comment += `| Violations | ${violations} |\n\n`;

          // Per-file table for changed files
          if (checkChanged?.files?.length > 0) {
            comment += `### Changed Files in This PR\n\n`;
            comment += `| File | Score | Violations |\n|------|-------|------------|\n`;
            for (const r of checkChanged.files.sort((a, b) => a.score - b.score)) {
              const fIcon = r.score >= 80 ? '✅' : r.score >= 60 ? '⚠️' : '❌';
              const errs = r.violations?.filter(v => v.severity === 'error').length || 0;
              const warns = r.violations?.filter(v => v.severity === 'warning').length || 0;
              const vCount = r.violations?.length > 0 ? `${errs}E ${warns}W` : '—';
              comment += `| ${fIcon} \`${r.file}\` | ${r.score}/100 | ${vCount} |\n`;
            }
            comment += '\n';

            // Show violations for flagged files
            const flagged = checkChanged.files.filter(r => r.score < 80 && r.violations?.length > 0);
            if (flagged.length > 0) {
              comment += `<details>\n<summary>📋 Violations in flagged files</summary>\n\n`;
              for (const r of flagged.slice(0, 5)) {
                comment += `**${r.file}** (${r.score}/100)\n`;
                for (const v of r.violations.slice(0, 10)) {
                  const vi = v.severity === 'error' ? '❌' : '⚠️';
                  comment += `- ${vi} Line ${v.line}: ${v.message}\n`;
                }
                if (r.violations.length > 10) {
                  comment += `- ... and ${r.violations.length - 10} more\n`;
                }
                comment += '\n';
              }
              comment += `</details>\n\n`;
            }
          } else if (combined >= 80) {
            comment += `✅ **Narrative is coherent.** All ${units} units pass.\n\n`;
          }

          // Trend
          if (status.previous != null) {
            const trend = combined > status.previous ? '↑' : combined < status.previous ? '↓' : '→';
            comment += `*Trend: ${trend} from ${status.previous}/100*\n\n`;
          }

          comment += `---\n*Checked ${units} narrative units and ${files} content files via \`narrative check\`*`;

          fs.writeFileSync('/tmp/clarion-comment.md', comment);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `score=${combined}\n`);

          console.log(`Clarion Call: ${combined}/100 (canon: ${canonScore}, content: ${contentScore})`);

          if (combined < 60) {
            console.log('\n❌ Combined score below 60. Failing check.');
            process.exit(1);
          }
          SCRIPT

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('/tmp/clarion-comment.md', 'utf-8');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.body.includes('📣 Clarion Call') && c.user.type === 'Bot'
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment,
              });
            }
