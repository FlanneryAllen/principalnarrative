<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Narrative Intelligence — Dashboard</title>
  <meta name="description" content="Visual dashboard for Narrative Algebra operations — stakeholder views, NCI metrics, drift detection, and propagation impact analysis.">

  <!-- Fonts: Geist Mono for data, Inter for UI -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300..700&family=Inter:wght@300..700&display=swap" rel="stylesheet">

  <!-- D3 for graph viz -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

  <style>
    /* =========================================================
       DESIGN TOKENS
       ========================================================= */
    :root {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.8125rem);
      --text-sm: clamp(0.8125rem, 0.78rem + 0.2vw, 0.875rem);
      --text-base: clamp(0.875rem, 0.85rem + 0.15vw, 0.9375rem);
      --text-lg: clamp(1rem, 0.95rem + 0.3vw, 1.125rem);
      --text-xl: clamp(1.25rem, 1.1rem + 0.5vw, 1.5rem);

      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;

      --font-body: 'Inter', 'Helvetica Neue', sans-serif;
      --font-mono: 'Geist Mono', 'JetBrains Mono', monospace;

      --radius-sm: 0.25rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;

      --transition-fast: 150ms cubic-bezier(0.16, 1, 0.3, 1);
      --transition-med: 250ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Dark theme (default) */
    :root, [data-theme="dark"] {
      --color-bg: #0c0d10;
      --color-surface: #13141a;
      --color-surface-2: #1a1b23;
      --color-surface-3: #22232e;
      --color-border: #2a2b38;
      --color-border-subtle: #1e1f2a;
      --color-text: #e0e1e6;
      --color-text-muted: #8b8d98;
      --color-text-faint: #52536a;

      --color-aligned: #4ade80;
      --color-drifted: #fbbf24;
      --color-broken: #f87171;

      --color-accent: #6c8aff;
      --color-accent-hover: #8da4ff;

      --layer-core: #4f98a3;
      --layer-positioning: #a86fdf;
      --layer-product: #5591c7;
      --layer-operational: #edb336;
      --layer-evidence: #6daa45;
      --layer-communication: #dd6974;
    }

    /* Light theme */
    [data-theme="light"] {
      --color-bg: #f4f4f7;
      --color-surface: #ffffff;
      --color-surface-2: #f0f0f4;
      --color-surface-3: #e8e8ee;
      --color-border: #d4d4dc;
      --color-border-subtle: #e4e4eb;
      --color-text: #1a1a2e;
      --color-text-muted: #6b6b80;
      --color-text-faint: #9e9eb5;

      --color-aligned: #16a34a;
      --color-drifted: #d97706;
      --color-broken: #dc2626;

      --color-accent: #4f6adb;
      --color-accent-hover: #3d55c4;

      --layer-core: #0c7a84;
      --layer-positioning: #7a39bb;
      --layer-product: #2b6fa3;
      --layer-operational: #c49000;
      --layer-evidence: #437a22;
      --layer-communication: #b93d4a;
    }

    /* =========================================================
       RESET & BASE
       ========================================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--color-text);
      background: var(--color-bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* =========================================================
       DASHBOARD SHELL
       ========================================================= */
    .dashboard {
      display: grid;
      grid-template-columns: 260px 1fr;
      grid-template-rows: 56px 1fr;
      height: 100dvh;
    }

    /* ---- HEADER ---- */
    .header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--space-5);
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      z-index: 20;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .logo-mark {
      width: 28px;
      height: 28px;
    }

    .logo-text {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--color-text);
    }

    .header-tag {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-accent);
      background: color-mix(in srgb, var(--color-accent) 12%, transparent);
      padding: 2px 8px;
      border-radius: var(--radius-sm);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .theme-toggle {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: none;
      color: var(--color-text-muted);
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: color var(--transition-fast), background var(--transition-fast);
    }
    .theme-toggle:hover {
      color: var(--color-text);
      background: var(--color-surface-2);
    }

    /* ---- SIDEBAR ---- */
    .sidebar {
      grid-row: 2;
      overflow-y: auto;
      overscroll-behavior: contain;
      background: var(--color-surface);
      border-right: 1px solid var(--color-border);
      padding: var(--space-4) 0;
    }

    .sidebar-section {
      padding: 0 var(--space-4);
      margin-bottom: var(--space-6);
    }

    .sidebar-label {
      font-size: var(--text-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-faint);
      margin-bottom: var(--space-2);
    }

    .stakeholder-btn {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      width: 100%;
      padding: var(--space-2) var(--space-3);
      border: none;
      background: none;
      color: var(--color-text-muted);
      font-family: var(--font-body);
      font-size: var(--text-sm);
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: all var(--transition-fast);
      text-align: left;
    }
    .stakeholder-btn:hover {
      background: var(--color-surface-2);
      color: var(--color-text);
    }
    .stakeholder-btn.active {
      background: color-mix(in srgb, var(--color-accent) 15%, transparent);
      color: var(--color-accent);
      font-weight: 500;
    }

    .stakeholder-btn .btn-icon {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .stakeholder-desc {
      font-size: var(--text-xs);
      color: var(--color-text-faint);
      padding: var(--space-1) 0 0 calc(18px + var(--space-2));
    }

    .layer-legend {
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      padding: var(--space-1) 0;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .state-legend {
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
    }

    .state-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      padding: var(--space-1) 0;
    }

    .state-pip {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ---- MAIN CONTENT ---- */
    .main {
      grid-column: 2;
      grid-row: 2;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: var(--space-4) var(--space-5);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    /* ---- VIEW HEADER ---- */
    .view-header {
      display: flex;
      align-items: baseline;
      gap: var(--space-3);
    }

    .view-title {
      font-size: var(--text-xl);
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .view-subtitle {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
    }

    /* ---- KPI STRIP ---- */
    .kpi-strip {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: var(--space-3);
    }

    .kpi-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
      transition: border-color var(--transition-fast);
    }
    .kpi-card:hover {
      border-color: var(--color-border);
    }

    .kpi-label {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .kpi-value {
      font-family: var(--font-mono);
      font-size: var(--text-xl);
      font-weight: 600;
      font-variant-numeric: tabular-nums lining-nums;
      line-height: 1.2;
    }

    .kpi-detail {
      font-size: var(--text-xs);
      color: var(--color-text-faint);
      font-variant-numeric: tabular-nums;
    }

    .kpi-value.good { color: var(--color-aligned); }
    .kpi-value.warn { color: var(--color-drifted); }
    .kpi-value.bad { color: var(--color-broken); }

    /* ---- TWO-PANEL LAYOUT ---- */
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
      flex: 1;
      min-height: 0;
    }

    .panel {
      background: var(--color-surface);
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius-md);
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-3) var(--space-4);
      border-bottom: 1px solid var(--color-border-subtle);
      flex-shrink: 0;
    }

    .panel-title {
      font-size: var(--text-sm);
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .panel-badge {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-text-faint);
    }

    .panel-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    /* ---- GRAPH VIZ ---- */
    .graph-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .graph-container svg {
      width: 100%;
      height: 100%;
    }

    .graph-node {
      cursor: pointer;
      transition: opacity var(--transition-fast);
    }

    .graph-node.dimmed {
      opacity: 0.15;
    }

    .graph-link {
      stroke: var(--color-border);
      stroke-width: 1.5;
      fill: none;
      transition: opacity var(--transition-fast), stroke var(--transition-fast);
    }
    .graph-link.dimmed {
      opacity: 0.08;
    }
    .graph-link.highlighted {
      stroke: var(--color-accent);
      stroke-width: 2;
      opacity: 1;
    }

    .node-circle {
      stroke-width: 2;
      transition: r var(--transition-fast);
    }

    .node-label {
      font-family: var(--font-mono);
      font-size: 10px;
      fill: var(--color-text-muted);
      pointer-events: none;
      transition: fill var(--transition-fast);
    }

    .node-state-ring {
      fill: none;
      stroke-width: 2;
      stroke-dasharray: 3 2;
      opacity: 0.7;
    }

    /* ---- UNIT TABLE ---- */
    .unit-table {
      width: 100%;
      border-collapse: collapse;
      font-size: var(--text-xs);
    }

    .unit-table thead {
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--color-surface);
    }

    .unit-table th {
      text-align: left;
      padding: var(--space-2) var(--space-3);
      font-weight: 600;
      color: var(--color-text-faint);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--color-border);
      font-size: 10px;
    }

    .unit-table td {
      padding: var(--space-2) var(--space-3);
      border-bottom: 1px solid var(--color-border-subtle);
      vertical-align: top;
    }

    .unit-table tr {
      transition: background var(--transition-fast);
      cursor: pointer;
    }
    .unit-table tbody tr:hover {
      background: var(--color-surface-2);
    }
    .unit-table tbody tr.selected {
      background: color-mix(in srgb, var(--color-accent) 10%, transparent);
    }

    .unit-id {
      font-family: var(--font-mono);
      font-weight: 500;
      white-space: nowrap;
    }

    .unit-assertion {
      color: var(--color-text-muted);
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .unit-type-badge {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      padding: 1px 6px;
      border-radius: var(--radius-sm);
      white-space: nowrap;
    }

    .state-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      padding: 1px 6px;
      border-radius: var(--radius-sm);
      white-space: nowrap;
    }
    .state-badge.aligned {
      color: var(--color-aligned);
      background: color-mix(in srgb, var(--color-aligned) 12%, transparent);
    }
    .state-badge.drifted {
      color: var(--color-drifted);
      background: color-mix(in srgb, var(--color-drifted) 12%, transparent);
    }
    .state-badge.broken {
      color: var(--color-broken);
      background: color-mix(in srgb, var(--color-broken) 12%, transparent);
    }

    .confidence-bar {
      width: 48px;
      height: 6px;
      background: var(--color-surface-3);
      border-radius: 3px;
      overflow: hidden;
      display: inline-block;
      vertical-align: middle;
    }
    .confidence-fill {
      height: 100%;
      border-radius: 3px;
      transition: width var(--transition-med);
    }
    .confidence-text {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--color-text-faint);
      margin-left: 4px;
      font-variant-numeric: tabular-nums;
    }

    /* ---- COVERAGE BAR CHART ---- */
    .coverage-section {
      background: var(--color-surface);
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
    }

    .coverage-title {
      font-size: var(--text-sm);
      font-weight: 600;
      margin-bottom: var(--space-3);
    }

    .coverage-grid {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .coverage-row {
      display: grid;
      grid-template-columns: 100px 1fr 48px;
      align-items: center;
      gap: var(--space-3);
    }

    .coverage-label {
      font-size: var(--text-xs);
      font-weight: 500;
      color: var(--color-text-muted);
      text-align: right;
    }

    .coverage-bar-track {
      height: 20px;
      background: var(--color-surface-3);
      border-radius: var(--radius-sm);
      overflow: hidden;
      position: relative;
    }

    .coverage-bar-fill {
      height: 100%;
      border-radius: var(--radius-sm);
      transition: width 600ms cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      align-items: center;
      padding: 0 var(--space-2);
    }

    .coverage-bar-fill span {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      color: var(--color-bg);
      white-space: nowrap;
    }

    .coverage-pct {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      font-weight: 600;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* ---- DRIFT DETAIL ---- */
    .drift-section {
      background: var(--color-surface);
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
    }

    .drift-title {
      font-size: var(--text-sm);
      font-weight: 600;
      margin-bottom: var(--space-3);
    }

    .drift-item {
      display: flex;
      gap: var(--space-3);
      padding: var(--space-2) 0;
      border-bottom: 1px solid var(--color-border-subtle);
    }
    .drift-item:last-child {
      border-bottom: none;
    }

    .drift-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: var(--text-sm);
    }

    .drift-content {
      flex: 1;
      min-width: 0;
    }

    .drift-id {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      font-weight: 600;
      margin-bottom: 2px;
    }

    .drift-desc {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .drift-meta {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--color-text-faint);
      margin-top: 2px;
    }

    /* ---- BOTTOM ROW ---- */
    .bottom-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
    }

    /* ---- PROPAGATION DETAIL ---- */
    .propagation-section {
      background: var(--color-surface);
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
    }

    .prop-title {
      font-size: var(--text-sm);
      font-weight: 600;
      margin-bottom: var(--space-2);
    }

    .prop-subtitle {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-bottom: var(--space-3);
    }

    .prop-chain {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      flex-wrap: wrap;
      margin-bottom: var(--space-3);
    }

    .prop-node {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      border: 1px solid;
      white-space: nowrap;
    }

    .prop-arrow {
      color: var(--color-text-faint);
      font-size: var(--text-xs);
    }

    .prop-stat {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-text-faint);
    }

    /* ---- TOOLTIP ---- */
    .tooltip {
      position: fixed;
      pointer-events: none;
      z-index: 100;
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      max-width: 320px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      opacity: 0;
      transition: opacity var(--transition-fast);
      font-size: var(--text-xs);
    }
    .tooltip.visible {
      opacity: 1;
    }

    .tooltip-id {
      font-family: var(--font-mono);
      font-weight: 600;
      margin-bottom: var(--space-1);
    }

    .tooltip-assertion {
      color: var(--color-text-muted);
      margin-bottom: var(--space-2);
      line-height: 1.5;
    }

    .tooltip-meta {
      display: flex;
      gap: var(--space-3);
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--color-text-faint);
    }

    /* ---- ANIMATIONS ---- */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-in {
      animation: fadeIn 300ms cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* ---- REDUCED MOTION ---- */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ---- SCROLLBAR ---- */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--color-text-faint); }
  </style>
</head>
<body>
  <div class="dashboard">
    <!-- HEADER -->
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <svg class="logo-mark" viewBox="0 0 28 28" fill="none" aria-label="Narrative Intelligence">
            <rect x="2" y="2" width="24" height="24" rx="4" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="9" cy="10" r="2.5" fill="var(--layer-core)"/>
            <circle cx="19" cy="10" r="2.5" fill="var(--layer-positioning)"/>
            <circle cx="14" cy="18" r="2.5" fill="var(--layer-product)"/>
            <line x1="11" y1="11" x2="13" y2="17" stroke="var(--color-text-faint)" stroke-width="1"/>
            <line x1="17" y1="11" x2="15" y2="17" stroke="var(--color-text-faint)" stroke-width="1"/>
            <line x1="11.5" y1="10" x2="16.5" y2="10" stroke="var(--color-text-faint)" stroke-width="1"/>
          </svg>
          <span class="logo-text">narrative-intel</span>
        </div>
        <span class="header-tag">Algebra Dashboard v0.1</span>
      </div>
      <div class="header-right">
        <button class="theme-toggle" data-theme-toggle aria-label="Switch to light mode">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Stakeholder View</div>
        <div id="stakeholder-nav"></div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Layer Legend</div>
        <div class="layer-legend" id="layer-legend"></div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Validation States</div>
        <div class="state-legend">
          <div class="state-item"><span class="state-pip" style="background:var(--color-aligned)"></span> Aligned</div>
          <div class="state-item"><span class="state-pip" style="background:var(--color-drifted)"></span> Drifted</div>
          <div class="state-item"><span class="state-pip" style="background:var(--color-broken)"></span> Broken</div>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main" id="main-content">
      <!-- Filled by JS -->
    </main>
  </div>

  <!-- TOOLTIP -->
  <div class="tooltip" id="tooltip"></div>

  <script>
    // =========================================================
    // DATA LAYER
    // =========================================================
    let DATA = null;
    let currentStakeholder = 'all';
    let selectedUnitId = null;

    const STAKEHOLDER_ICONS = {
      all: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><line x1="2" y1="8" x2="14" y2="8"/><line x1="8" y1="2" x2="8" y2="14"/></svg>`,
      board: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2L14 6V14H2V6L8 2Z"/></svg>`,
      engineering: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 2L2 5L5 8"/><path d="M11 8L14 11L11 14"/><line x1="10" y1="2" x2="6" y2="14"/></svg>`,
      compliance: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2L13 5V10L8 14L3 10V5L8 2Z"/><polyline points="6 8 7.5 9.5 10 6.5"/></svg>`,
      customer: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="5" r="3"/><path d="M3 14C3 11.2 5.2 9 8 9C10.8 9 13 11.2 13 14"/></svg>`,
      marketing: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L4 6H2V10H4L12 14V2Z"/><path d="M14 6C14.6 7 14.6 9 14 10"/></svg>`
    };

    const LAYER_COLORS = {
      core_story: 'var(--layer-core)',
      positioning: 'var(--layer-positioning)',
      product_narrative: 'var(--layer-product)',
      operational: 'var(--layer-operational)',
      evidence: 'var(--layer-evidence)',
      communication: 'var(--layer-communication)'
    };

    const STATE_COLOR = {
      ALIGNED: 'var(--color-aligned)',
      DRIFTED: 'var(--color-drifted)',
      BROKEN: 'var(--color-broken)'
    };

    // =========================================================
    // INIT
    // =========================================================
    async function init() {
      const res = await fetch('data.json');
      DATA = await res.json();
      buildSidebar();
      renderView('all');
      initThemeToggle();
    }

    function initThemeToggle() {
      const btn = document.querySelector('[data-theme-toggle]');
      const root = document.documentElement;
      let theme = root.getAttribute('data-theme') || (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
      root.setAttribute('data-theme', theme);
      updateToggleIcon(btn, theme);

      btn.addEventListener('click', () => {
        theme = theme === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', theme);
        updateToggleIcon(btn, theme);
        // Re-render graph since colors change
        renderView(currentStakeholder);
      });
    }

    function updateToggleIcon(btn, theme) {
      btn.innerHTML = theme === 'dark'
        ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`
        : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
      btn.setAttribute('aria-label', `Switch to ${theme === 'dark' ? 'light' : 'dark'} mode`);
    }

    // =========================================================
    // SIDEBAR
    // =========================================================
    function buildSidebar() {
      const nav = document.getElementById('stakeholder-nav');
      const presets = DATA.stakeholderPresets;

      nav.innerHTML = Object.entries(presets).map(([key, preset]) => `
        <button class="stakeholder-btn ${key === 'all' ? 'active' : ''}" data-stakeholder="${key}">
          <span class="btn-icon">${STAKEHOLDER_ICONS[key] || STAKEHOLDER_ICONS.all}</span>
          ${preset.label}
        </button>
      `).join('');

      nav.addEventListener('click', (e) => {
        const btn = e.target.closest('.stakeholder-btn');
        if (!btn) return;
        nav.querySelectorAll('.stakeholder-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const key = btn.dataset.stakeholder;
        currentStakeholder = key;
        selectedUnitId = null;
        renderView(key);
      });

      // Layer legend
      const legend = document.getElementById('layer-legend');
      legend.innerHTML = Object.entries(DATA.layerMeta).map(([key, meta]) => `
        <div class="legend-item">
          <span class="legend-dot" style="background:${LAYER_COLORS[key]}"></span>
          ${meta.label}
        </div>
      `).join('');
    }

    // =========================================================
    // RENDER VIEW
    // =========================================================
    function renderView(stakeholder) {
      const preset = DATA.stakeholderPresets[stakeholder];
      const filtered = DATA.units.filter(u => preset.types.includes(u.type));
      const main = document.getElementById('main-content');

      // Compute metrics
      const aligned = filtered.filter(u => u.validationState === 'ALIGNED');
      const drifted = filtered.filter(u => u.validationState === 'DRIFTED');
      const broken = filtered.filter(u => u.validationState === 'BROKEN');
      const nci = filtered.length > 0 ? (aligned.length / filtered.length) : 0;
      const avgConf = filtered.length > 0
        ? (filtered.reduce((s, u) => s + u.confidence, 0) / filtered.length)
        : 0;
      const driftRate = filtered.length > 0 ? ((drifted.length + broken.length) / filtered.length) : 0;

      const nciClass = nci >= 0.8 ? 'good' : nci >= 0.5 ? 'warn' : 'bad';
      const driftClass = driftRate <= 0.15 ? 'good' : driftRate <= 0.35 ? 'warn' : 'bad';

      // Propagation impact for worst drifted unit
      const driftedUnits = filtered.filter(u => u.validationState !== 'ALIGNED');
      let worstUnit = null;
      let worstImpact = [];
      if (driftedUnits.length > 0) {
        for (const du of driftedUnits) {
          const impact = computePropagation(du.id);
          if (impact.length > worstImpact.length) {
            worstUnit = du;
            worstImpact = impact;
          }
        }
      }

      main.innerHTML = `
        <div class="view-header animate-in">
          <h1 class="view-title">${preset.label} View</h1>
          <span class="view-subtitle">${preset.description} — ${filtered.length} unit${filtered.length !== 1 ? 's' : ''}</span>
        </div>

        <div class="kpi-strip animate-in" style="animation-delay:50ms">
          <div class="kpi-card">
            <span class="kpi-label">NCI Score</span>
            <span class="kpi-value ${nciClass}">${nci.toFixed(3)}</span>
            <span class="kpi-detail">${aligned.length} of ${filtered.length} aligned</span>
          </div>
          <div class="kpi-card">
            <span class="kpi-label">Units</span>
            <span class="kpi-value">${filtered.length}</span>
            <span class="kpi-detail">of ${DATA.units.length} total</span>
          </div>
          <div class="kpi-card">
            <span class="kpi-label">Drift Rate</span>
            <span class="kpi-value ${driftClass}">${(driftRate * 100).toFixed(1)}%</span>
            <span class="kpi-detail">${drifted.length} drifted, ${broken.length} broken</span>
          </div>
          <div class="kpi-card">
            <span class="kpi-label">Avg Confidence</span>
            <span class="kpi-value">${(avgConf * 100).toFixed(0)}%</span>
            <span class="kpi-detail">across filtered units</span>
          </div>
          <div class="kpi-card">
            <span class="kpi-label">Max Impact</span>
            <span class="kpi-value ${worstImpact.length > 2 ? 'bad' : worstImpact.length > 0 ? 'warn' : 'good'}">${worstImpact.length}</span>
            <span class="kpi-detail">${worstUnit ? worstUnit.id : 'none'}</span>
          </div>
        </div>

        <div class="panels animate-in" style="animation-delay:100ms">
          <div class="panel">
            <div class="panel-header">
              <span class="panel-title">Narrative Graph</span>
              <span class="panel-badge">DAG</span>
            </div>
            <div class="panel-body">
              <div class="graph-container" id="graph-container"></div>
            </div>
          </div>
          <div class="panel">
            <div class="panel-header">
              <span class="panel-title">Narrative Units</span>
              <span class="panel-badge">${filtered.length} unit${filtered.length !== 1 ? 's' : ''}</span>
            </div>
            <div class="panel-body">
              <table class="unit-table">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Layer</th>
                    <th>State</th>
                    <th>Conf</th>
                    <th>Assertion</th>
                  </tr>
                </thead>
                <tbody id="unit-tbody">
                  ${filtered.map(u => unitRow(u)).join('')}
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <div class="bottom-row animate-in" style="animation-delay:150ms">
          <div class="coverage-section">
            <div class="coverage-title">Coverage by Layer (κ)</div>
            <div class="coverage-grid" id="coverage-grid">
              ${buildCoverageHTML(filtered)}
            </div>
          </div>
          ${worstUnit ? `
          <div class="propagation-section">
            <div class="prop-title">Propagation Impact (Δ)</div>
            <div class="prop-subtitle">If "${worstUnit.id}" is resolved, impact chain:</div>
            <div class="prop-chain">
              <span class="prop-node" style="border-color:${STATE_COLOR[worstUnit.validationState]};color:${STATE_COLOR[worstUnit.validationState]}">${worstUnit.id}</span>
              ${worstImpact.map(u => `
                <span class="prop-arrow">→</span>
                <span class="prop-node" style="border-color:${LAYER_COLORS[u.type]};color:${LAYER_COLORS[u.type]}">${u.id}</span>
              `).join('')}
            </div>
            <div class="prop-stat">${worstImpact.length} downstream unit${worstImpact.length !== 1 ? 's' : ''} affected · ${(worstImpact.length / DATA.units.length * 100).toFixed(1)}% of graph</div>
          </div>
          ` : `
          <div class="drift-section">
            <div class="drift-title">No Drift Detected</div>
            <p style="font-size:var(--text-xs);color:var(--color-text-muted)">All units in this view are aligned. NCI is at maximum coherence.</p>
          </div>
          `}
        </div>
      `;

      // Render graph
      renderGraph(filtered, stakeholder);

      // Table click
      const tbody = document.getElementById('unit-tbody');
      if (tbody) {
        tbody.addEventListener('click', (e) => {
          const row = e.target.closest('tr');
          if (!row) return;
          const id = row.dataset.unitId;
          if (selectedUnitId === id) {
            selectedUnitId = null;
            highlightUnit(null);
          } else {
            selectedUnitId = id;
            highlightUnit(id);
          }
          tbody.querySelectorAll('tr').forEach(r =>
            r.classList.toggle('selected', r.dataset.unitId === selectedUnitId));
        });
      }
    }

    function unitRow(u) {
      const stateClass = u.validationState.toLowerCase();
      const layerColor = LAYER_COLORS[u.type];
      return `
        <tr data-unit-id="${u.id}">
          <td><span class="unit-id">${u.id}</span></td>
          <td><span class="unit-type-badge" style="color:${layerColor};background:color-mix(in srgb, ${layerColor} 15%, transparent)">${DATA.layerMeta[u.type]?.label || u.type}</span></td>
          <td><span class="state-badge ${stateClass}">${u.validationState}</span></td>
          <td>
            <span class="confidence-bar"><span class="confidence-fill" style="width:${u.confidence * 100}%;background:${STATE_COLOR[u.validationState]}"></span></span>
            <span class="confidence-text">${(u.confidence * 100).toFixed(0)}%</span>
          </td>
          <td><span class="unit-assertion" title="${u.assertion}">${u.assertion}</span></td>
        </tr>
      `;
    }

    function buildCoverageHTML(filtered) {
      const layers = Object.entries(DATA.layerMeta);
      return layers.map(([type, meta]) => {
        const layerUnits = filtered.filter(u => u.type === type);
        if (layerUnits.length === 0) return '';
        const alignedCount = layerUnits.filter(u => u.validationState === 'ALIGNED').length;
        const pct = Math.round(alignedCount / layerUnits.length * 100);
        return `
          <div class="coverage-row">
            <span class="coverage-label">${meta.label}</span>
            <div class="coverage-bar-track">
              <div class="coverage-bar-fill" style="width:${pct}%;background:${LAYER_COLORS[type]}">
                ${pct >= 20 ? `<span>${alignedCount}/${layerUnits.length}</span>` : ''}
              </div>
            </div>
            <span class="coverage-pct" style="color:${pct >= 80 ? 'var(--color-aligned)' : pct >= 50 ? 'var(--color-drifted)' : 'var(--color-broken)'}">${pct}%</span>
          </div>
        `;
      }).join('');
    }

    // =========================================================
    // PROPAGATION
    // =========================================================
    function computePropagation(unitId) {
      const visited = new Set();
      const affected = [];
      function traverse(id) {
        if (visited.has(id)) return;
        visited.add(id);
        const dependents = DATA.units.filter(u => u.dependencies.includes(id));
        for (const dep of dependents) {
          affected.push(dep);
          traverse(dep.id);
        }
      }
      traverse(unitId);
      return affected;
    }

    // =========================================================
    // GRAPH VISUALIZATION (D3)
    // =========================================================
    function renderGraph(filtered, stakeholder) {
      const container = document.getElementById('graph-container');
      if (!container) return;
      container.innerHTML = '';

      const rect = container.getBoundingClientRect();
      const width = rect.width || 500;
      const height = rect.height || 400;

      // Build nodes and links
      const nodeIds = new Set(filtered.map(u => u.id));
      // Include dependency nodes from full graph that connect to filtered
      const allIds = new Set(nodeIds);
      for (const u of filtered) {
        for (const depId of u.dependencies) {
          allIds.add(depId);
        }
      }

      const nodes = [];
      for (const id of allIds) {
        const u = DATA.units.find(x => x.id === id);
        if (u) nodes.push({ ...u, inView: nodeIds.has(id) });
      }

      const links = [];
      for (const u of filtered) {
        for (const depId of u.dependencies) {
          if (allIds.has(depId)) {
            links.push({ source: depId, target: u.id });
          }
        }
      }

      const svg = d3.select(container)
        .append('svg')
        .attr('width', width)
        .attr('height', height)
        .attr('viewBox', `0 0 ${width} ${height}`);

      // Arrow marker
      svg.append('defs').append('marker')
        .attr('id', 'arrowhead')
        .attr('viewBox', '0 0 10 7')
        .attr('refX', 20)
        .attr('refY', 3.5)
        .attr('markerWidth', 8)
        .attr('markerHeight', 5)
        .attr('orient', 'auto')
        .append('path')
        .attr('d', 'M0,0 L10,3.5 L0,7')
        .attr('fill', 'var(--color-border)');

      // Force simulation
      const sim = d3.forceSimulation(nodes)
        .force('link', d3.forceLink(links).id(d => d.id).distance(80).strength(0.8))
        .force('charge', d3.forceManyBody().strength(-300))
        .force('center', d3.forceCenter(width / 2, height / 2))
        .force('y', d3.forceY(d => 40 + (d.layer || 0) * (height - 80) / 5).strength(0.5))
        .force('collision', d3.forceCollide(25));

      const linkGroup = svg.append('g');
      const nodeGroup = svg.append('g');

      const linkEls = linkGroup.selectAll('line')
        .data(links)
        .enter()
        .append('line')
        .attr('class', 'graph-link')
        .attr('marker-end', 'url(#arrowhead)');

      const nodeEls = nodeGroup.selectAll('g')
        .data(nodes)
        .enter()
        .append('g')
        .attr('class', 'graph-node')
        .call(d3.drag()
          .on('start', (event, d) => { if (!event.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
          .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
          .on('end', (event, d) => { if (!event.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
        );

      // State ring (for drifted/broken)
      nodeEls.filter(d => d.validationState !== 'ALIGNED')
        .append('circle')
        .attr('class', 'node-state-ring')
        .attr('r', 16)
        .attr('stroke', d => STATE_COLOR[d.validationState]);

      // Main circle
      nodeEls.append('circle')
        .attr('class', 'node-circle')
        .attr('r', d => d.inView ? 10 : 6)
        .attr('fill', d => d.inView ? (LAYER_COLORS[d.type] || '#666') : 'var(--color-surface-3)')
        .attr('stroke', d => d.inView ? 'var(--color-bg)' : 'var(--color-border)')
        .attr('opacity', d => d.inView ? 1 : 0.4);

      // Labels
      nodeEls.append('text')
        .attr('class', 'node-label')
        .attr('dx', 14)
        .attr('dy', 4)
        .text(d => d.id)
        .attr('opacity', d => d.inView ? 1 : 0.3);

      // Tooltip events
      const tooltip = document.getElementById('tooltip');
      nodeEls
        .on('mouseenter', (event, d) => {
          tooltip.innerHTML = `
            <div class="tooltip-id" style="color:${LAYER_COLORS[d.type]}">${d.id}</div>
            <div class="tooltip-assertion">${d.assertion}</div>
            <div class="tooltip-meta">
              <span>${DATA.layerMeta[d.type]?.label || d.type}</span>
              <span>·</span>
              <span style="color:${STATE_COLOR[d.validationState]}">${d.validationState}</span>
              <span>·</span>
              <span>conf: ${d.confidence}</span>
            </div>
          `;
          tooltip.classList.add('visible');
        })
        .on('mousemove', (event) => {
          tooltip.style.left = (event.clientX + 12) + 'px';
          tooltip.style.top = (event.clientY - 10) + 'px';
        })
        .on('mouseleave', () => {
          tooltip.classList.remove('visible');
        })
        .on('click', (event, d) => {
          event.stopPropagation();
          if (selectedUnitId === d.id) {
            selectedUnitId = null;
            highlightUnit(null);
          } else {
            selectedUnitId = d.id;
            highlightUnit(d.id);
          }
          // Sync table selection
          const tbody = document.getElementById('unit-tbody');
          if (tbody) {
            tbody.querySelectorAll('tr').forEach(r =>
              r.classList.toggle('selected', r.dataset.unitId === selectedUnitId));
          }
        });

      sim.on('tick', () => {
        linkEls
          .attr('x1', d => d.source.x)
          .attr('y1', d => d.source.y)
          .attr('x2', d => d.target.x)
          .attr('y2', d => d.target.y);
        nodeEls.attr('transform', d => `translate(${d.x},${d.y})`);
      });

      // Store refs for highlight
      window._graphRefs = { nodeEls, linkEls, nodes, links };
    }

    function highlightUnit(unitId) {
      if (!window._graphRefs) return;
      const { nodeEls, linkEls, nodes, links } = window._graphRefs;

      if (!unitId) {
        nodeEls.classed('dimmed', false);
        linkEls.classed('dimmed', false).classed('highlighted', false);
        return;
      }

      // Find connected IDs (deps + dependents)
      const unit = DATA.units.find(u => u.id === unitId);
      const connected = new Set([unitId]);
      if (unit) {
        for (const d of unit.dependencies) connected.add(d);
      }
      // Dependents
      for (const u of DATA.units) {
        if (u.dependencies.includes(unitId)) connected.add(u.id);
      }

      nodeEls.classed('dimmed', d => !connected.has(d.id));
      linkEls
        .classed('dimmed', d => {
          const sId = typeof d.source === 'object' ? d.source.id : d.source;
          const tId = typeof d.target === 'object' ? d.target.id : d.target;
          return !connected.has(sId) || !connected.has(tId);
        })
        .classed('highlighted', d => {
          const sId = typeof d.source === 'object' ? d.source.id : d.source;
          const tId = typeof d.target === 'object' ? d.target.id : d.target;
          return (sId === unitId || tId === unitId) && connected.has(sId) && connected.has(tId);
        });
    }

    // =========================================================
    // BOOT
    // =========================================================
    init();
  </script>
</body>
</html>
