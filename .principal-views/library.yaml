# Principal View Component Library
version: "1.0.0"
name: "Narrative Agent Component Library"
description: "Component library for Narrative Agent visualizations and telemetry"

# OTEL Resources - These are the services that emit telemetry
resources:
  web-app:
    service.name: "narrative-web-app"
    service.version: "1.0.0"
    deployment.environment: "development"

  api-server:
    service.name: "narrative-api"
    service.version: "1.0.0"
    deployment.environment: "development"

  intent-engine:
    service.name: "narrative-intent-engine"
    service.version: "1.0.0"
    deployment.environment: "development"

# Node components for reusable shapes
nodeComponents:
  service:
    description: "Backend service or API"
    color: "#3B82F6"
    shape: "rectangle"
    size:
      width: 120
      height: 60

  database:
    description: "Database or data storage"
    color: "#6366F1"
    shape: "cylinder"
    size:
      width: 120
      height: 80

  user:
    description: "User or actor"
    color: "#10B981"
    shape: "circle"
    size:
      width: 80
      height: 80

# Edge components for different connection types
edgeComponents:
  http:
    color: "#F59E0B"
    style: "solid"
    label: "HTTP"

  database:
    color: "#6366F1"
    style: "solid"
    label: "Query"

  event:
    color: "#8B5CF6"
    style: "dashed"
    label: "Event"

  internal:
    color: "#3B82F6"
    style: "dotted"
    label: "Internal"